name: CI

on:
  push:
    branches: [main]  # Only main, not dev or feature branches
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/**'

  test:
    name: Test (Python ${{ matrix.python-version }}${{ matrix.experimental && ' – experimental' || '' }})
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary supported runtime for VectorClaw v1.0 — must pass.
          - python-version: "3.11"
            experimental: false
          # Experimental — failures are informational only and do not block merges.
          - python-version: "3.12"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: pip install -e . pytest Pillow

      - name: Run tests
        run: pytest tests/ -v

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
